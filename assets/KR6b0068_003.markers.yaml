  - {type: variant, offset: 8671, length: 436, content: '昔有七比丘入山學道，十二年中不＝未【聖】不【大】，未【聖】不未能得道。自共議言：「學道甚難，毀形執節不避寒苦，終身乞食受辱難堪，道卒叵得罪難可除，唐自勞勤殞＝苦捎【聖】勤殞【大】，苦捎【聖】勤殞苦捎命山中，不如歸家修立門戶娶＝取【聖】娶【大】，取【聖】娶取

      妻養子，廣為利業快心樂意。安知後事？」於是七人即起出山。佛遙知＝見【聖】知【大】，見【聖】知見之應當得度，不忍小苦終墮地獄，甚可憐傷。佛即化作沙門往到谷口＝中【三】【聖】口【大】，中【宋】【元】【明】【聖】口中，逢（此）＋七【聖】七【大】，此七【聖】七此七比丘，化人問曰：「久承學道，何以來出？」七人答言：「學道勤苦罪根難拔，分衛乞食受辱難堪，又此山中無供養者，璅璅積年恒守儉約，唐自困苦道不可得。且欲還家廣求利業，大作資財後＝投【元】【明】【聖】後【大】，投【元】【明】【聖】後投老求道。」化沙門言：「且止〔且止〕－【三】且止【大】，〔－〕【宋】【元】【明】且止！聽我所言。人命無常旦不保夕＝夕不保【三】【聖】不保夕【大】，夕不保【宋】【元】【明】【聖】不保夕夕不保，學道雖〔難〕－【聖】難【大】，〔－〕【聖】難前苦後樂，居家艱難億劫無息，妻息＝子【三】【聖】息【大】，子【宋】【元】【明】【聖】

      息子會止願同安利，欲望永＝求【聖】永【大】，求【聖】永求樂不遭患難，是猶治病服毒有增無損也。三界有形皆有憂惱，唯有信戒＋（心）【三】【聖】戒【大】，戒心【宋】【元】【明】【聖】戒戒心無放逸〔意〕－【三】【聖】意【大】，〔－〕【宋】【元】【明】【聖】意，精進得道眾苦永畢。」

      於是化沙門現佛身相，光像巍巍即說偈言：

      「學難捨罪難，居在＝止【三】在【大】，止【宋】【元】【明】在止家亦難，

      會止同利難，艱難無過有。

      比丘乞求難，何可不自勉？

      精進得自然，終無欲於人。

      有信則戒成，從戒＝信【聖】戒【大】，信【聖】戒信多致寶，

      亦從得諧偶，在所見供養。

      一坐一處臥，一行不放恣＝逸【聖】恣【大】，逸【聖】恣逸，

      守一以正心，心＝必【三】【聖】心【大】，必【宋】【元】【明】【聖】心必樂居樹間。」

      於是七比丘見佛身相，又聞此偈慚怖戰慄，五體投地稽首佛足，攝心悔過作禮而去，還入山中殞命精進，思惟偈義，守一正心閑居寂滅，得羅漢道。', 宋: '', 元: '', 明: '', 聖: ''}
